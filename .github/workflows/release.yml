name: release
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    env: { CI: 'true' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - run: dotnet test tests/Garmr.Analyzers.Tests -c Release
      - run: bash samples/canary.sh
      - run: dotnet pack src/Garmr.Analyzers -c Release -o out -p:Version=${GITHUB_REF_NAME#v}
      - run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
